name: Build APK & IPA

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ezla-release-build
  cancel-in-progress: false

jobs:
  update-version:
    name: Auto-increment version
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      version_number: ${{ steps.bump.outputs.version_number }}
      new_tag: ${{ steps.bump.outputs.new_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate required Ezla source files
        shell: bash
        run: |
          required_files=(
            "lib/core/theme_controller.dart"
            "lib/models/app_user_profile.dart"
            "lib/models/status_request.dart"
            "lib/models/status_activity.dart"
            "lib/services/status_request_repository.dart"
            "lib/widgets/theme_toggle_button.dart"
            "lib/screens/activity/activity_screen.dart"
          )

          missing=0
          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Missing required file: $file"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "Extract Ezla_Project_Update.zip and commit all new files."
            exit 1
          fi

      - name: Read current version from pubspec.yaml
        id: read_version
        shell: bash
        run: |
          RAW_VERSION=$(awk '$1 == "version:" { print $2; exit }' pubspec.yaml)
          VERSION_NUMBER="${RAW_VERSION%%+*}"
          VERSION_NUMBER="${VERSION_NUMBER#V}"
          VERSION_NUMBER="${VERSION_NUMBER#v}"

          if [[ ! "$VERSION_NUMBER" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid pubspec.yaml version: $RAW_VERSION"
            echo "Expected a value such as 1.0.0+1"
            exit 1
          fi

          echo "current_version=$VERSION_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Current version: $VERSION_NUMBER"

      - name: Bump patch version
        id: bump
        shell: bash
        run: |
          VERSION="${{ steps.read_version.outputs.current_version }}"
          IFS='.' read -r major minor patch <<< "$VERSION"

          patch=$((patch + 1))
          VERSION_NUMBER="${major}.${minor}.${patch}"
          NEW_VERSION="V${VERSION_NUMBER}"

          echo "version_number=$VERSION_NUMBER" >> "$GITHUB_OUTPUT"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "new_tag=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "New version: $NEW_VERSION"

      - name: Update pubspec.yaml version
        shell: bash
        run: |
          sed -i \
            "s/^version:.*/version: ${{ steps.bump.outputs.version_number }}+${{ github.run_number }}/" \
            pubspec.yaml
          grep '^version:' pubspec.yaml

      - name: Commit version bump
        shell: bash
        run: |
          if [ "$GITHUB_REF_TYPE" != "branch" ]; then
            echo "Run this workflow from a branch, not from a tag."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml

          if git diff --cached --quiet; then
            echo "No version change to commit."
          else
            git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }}"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi

      - name: Create and push tag
        shell: bash
        run: |
          TAG="${{ steps.bump.outputs.new_tag }}"
          git fetch --tags --force

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists."
            exit 1
          fi

          git tag "$TAG"
          git push origin "$TAG"

  build-apk:
    name: Android APK
    runs-on: ubuntu-latest
    needs: update-version

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.update-version.outputs.new_tag }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.6"
          channel: stable
          cache: true

      - name: Get Flutter packages
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Prepare APK artifact
        shell: bash
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk \
            "dist/Ezla-Project-${{ needs.update-version.outputs.new_version }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: dist/*.apk
          if-no-files-found: error

  build-ios:
    name: iOS unsigned IPA
    runs-on: macos-latest
    needs: update-version

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.update-version.outputs.new_tag }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.6"
          channel: stable
          cache: true

      - name: Enable Swift Package Manager
        run: flutter config --enable-swift-package-manager

      - name: Get Flutter packages
        run: flutter pub get

      - name: Create GoogleService-Info.plist
        shell: bash
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: |
          if [ -z "$GOOGLE_SERVICE_INFO_PLIST" ]; then
            echo "The GOOGLE_SERVICE_INFO_PLIST secret is missing."
            exit 1
          fi

          printf '%s' "$GOOGLE_SERVICE_INFO_PLIST" \
            > ios/Runner/GoogleService-Info.plist

      - name: Build unsigned iOS app
        run: flutter build ios --release --no-codesign

      - name: Package unsigned IPA
        shell: bash
        run: |
          IPA_NAME="Ezla-Project-${{ needs.update-version.outputs.new_version }}-unsigned.ipa"
          PACKAGE_DIR="$RUNNER_TEMP/ezla-ipa"

          mkdir -p "$PACKAGE_DIR/Payload" "$GITHUB_WORKSPACE/dist"
          cp -R build/ios/iphoneos/Runner.app "$PACKAGE_DIR/Payload/"

          cd "$PACKAGE_DIR"
          zip -qry "$GITHUB_WORKSPACE/dist/$IPA_NAME" Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: dist/*.ipa
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - update-version
      - build-apk
      - build-ios

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files
          merge-multiple: true

      - name: Show release files
        run: ls -lh release-files

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.update-version.outputs.new_tag }}
          VERSION: ${{ needs.update-version.outputs.new_version }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" release-files/* --clobber
          else
            gh release create "$TAG" release-files/* \
              --title "Ezla Project $VERSION" \
              --notes "Android release APK and unsigned iOS IPA for $VERSION."
          fi
