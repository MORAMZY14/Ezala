name: mmr_cabinets_app
description: Ezla Project realtime cabinet, box, and approval management.
publish_to: none
version: 1.0.6+12

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cloud_firestore: ^6.7.1
  cupertino_icons: ^1.0.8
  excel: ^4.0.6
  file_picker: ^11.0.2
  firebase_auth: ^6.5.6
  firebase_core: ^4.12.1
  firebase_storage: ^13.4.5
  intl: ^0.20.2
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/mmr_cabinets.json
